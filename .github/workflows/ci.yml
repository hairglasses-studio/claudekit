name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: hairglasses-studio/mcpkit
          path: ../mcpkit
          token: ${{ secrets.MCPKIT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: make check

      - name: Test count
        run: go test ./... -v 2>&1 | grep -c "^--- PASS" | xargs -I{} echo "Tests passed: {}"
