name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: hairglasses-studio/mcpkit
          path: mcpkit
          token: ${{ secrets.MCPKIT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Adjust replace directive to match CI layout.
      - name: Fix mcpkit replace path
        run: go mod edit -replace github.com/hairglasses-studio/mcpkit=./mcpkit

      - run: make check

      - name: Test count
        run: |
          count=$(go test ./... -v 2>&1 | grep -c "^--- PASS")
          echo "Tests passed: $count"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: hairglasses-studio/mcpkit
          path: mcpkit
          token: ${{ secrets.MCPKIT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Fix mcpkit replace path
        run: go mod edit -replace github.com/hairglasses-studio/mcpkit=./mcpkit

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
