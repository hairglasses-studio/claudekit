# Inherit global Codex defaults from ~/.codex/config.toml.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by dotfiles/scripts/hg-codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Discovery-first profile for claudekit MCP server.
[mcp_servers.claudekit_review]
command = "go"
args = ["run", "./cmd/claudekit-mcp"]
enabled_tools = [
  "skill_list",
  "theme_list",
  "font_status",
  "env_status",
  "workflow_list",
  "memory_list",
  "memory_search",
  "rdcycle_perpetual_status",
  "finops_status",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[agents]
max_threads = 4
max_depth = 1

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
