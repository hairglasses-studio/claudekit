args = ["run", "./cmd/claudekit-mcp"]
enabled_tools = [
  "claudekit_tool_search",
  "claudekit_tool_catalog",
  "claudekit_tool_schema",
  "claudekit_tool_stats",
  "claudekit_server_health",
  "font_status",
  "theme_list",
  "env_status",
  "skill_list",
  "ralph_status",
  "roadmap_read",
  "roadmap_gaps",
  "roadmap_next_phase",
  "finops_status",
  "memory_get",
  "memory_list",
  "memory_search",
  "rdcycle_scan",
  "rdcycle_verify",
  "rdcycle_artifacts",
  "rdcycle_report",
  "rdcycle_perpetual_status",
  "workflow_list",
]

# Broader claudekit workspace profile for local environment changes and workflows.
[mcp_servers.claudekit_workspace]
command = "go"
args = ["run", "./cmd/claudekit-mcp"]
enabled_tools = [
  "claudekit_tool_search",
  "claudekit_tool_catalog",
  "claudekit_tool_schema",
  "claudekit_tool_stats",
  "claudekit_server_health",
  "font_status",
  "font_install",
  "font_configure",
  "theme_apply",
  "theme_list",
  "statusline_install",
  "env_status",
  "env_snapshot",
  "skill_list",
  "skill_install",
  "ralph_start",
  "ralph_stop",
  "ralph_status",
  "roadmap_read",
  "roadmap_update",
  "roadmap_gaps",
  "roadmap_next_phase",
  "finops_status",
  "finops_reset",
  "memory_get",
  "memory_set",
  "memory_list",
  "memory_search",
  "rdcycle_scan",
  "rdcycle_plan",
  "rdcycle_verify",
  "rdcycle_artifacts",
  "rdcycle_commit",
  "rdcycle_report",
  "rdcycle_schedule",
  "rdcycle_notes",
  "rdcycle_improve",
  "rdcycle_perpetual_start",
  "rdcycle_perpetual_stop",
  "rdcycle_perpetual_status",
  "workflow_list",
  "workflow_run",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[agents]
max_threads = 4
max_depth = 1

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
